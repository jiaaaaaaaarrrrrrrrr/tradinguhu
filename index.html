<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JIA YEE TRADER</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d1117;
    color: #fff;
}

.navbar {
    padding: 15px 30px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    color: #00e676;
    font-weight: bold;
}

.layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    height: calc(100vh - 60px);
}

/* 左侧 */
.sidebar {
    background: #161b22;
    padding: 15px;
    border-right: 1px solid #30363d;
}

.market {
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 8px;
    cursor: pointer;
}

.market:hover {
    background: #21262d;
}

/* 图表 */
.chart {
    padding: 10px;
}
</style>
</head>

<body>

<div class="navbar">JIA YEE TRADER</div>

<div class="layout">

    <!-- 左侧市场 -->
    <div class="sidebar">
        <h3>Markets</h3>

        <div class="market" onclick="loadChart('BINANCE:BTCUSDT')">BTC/USDT</div>
        <div class="market" onclick="loadChart('BINANCE:ETHUSDT')">ETH/USDT</div>
        <div class="market" onclick="loadChart('OANDA:XAUUSD')">Gold</div>
        <div class="market" onclick="loadChart('FOREXCOM:EURUSD')">EUR/USD</div>

    </div>

    <!-- 图表 -->
    <div class="chart">
        <div id="tv_chart" style="height:100%;"></div>
    </div>

</div>

<script>

let widget;

function loadChart(symbol){

    document.getElementById('tv_chart').innerHTML = "";

    widget = new TradingView.widget({
        width: "100%",
        height: "100%",
        symbol: symbol,
        interval: "15",
        timezone: "Asia/Kuala_Lumpur",
        theme: "dark",

        /* 🔥 重点：开启画图工具 */
        studies: [],
        hide_side_toolbar: false,  // 👉 显示画图工具栏
        allow_symbol_change: true,

        /* 更多专业设置 */
        withdateranges: true,
        details: true,
        hotlist: true,
        calendar: true,

        container_id: "tv_chart"
    });
}

/* 默认 */
loadChart('BINANCE:BTCUSDT');

</script>

</body>
</html>
